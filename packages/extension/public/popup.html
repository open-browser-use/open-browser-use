<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>open-browser-use</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="shell" class="shell">
      <header class="header">
        <div class="brand-row">
          <div class="brand-identity">
            <span class="brand-mark-wrap" aria-hidden="true">
              <img class="brand-mark" src="icons/icon-48.png" width="40" height="40" alt="" />
            </span>
            <a class="brand-link brand-wordmark" href="https://open-browser-use.xyz" target="_blank" rel="noopener noreferrer">open-browser-use</a>
          </div>
          <div class="header-actions">
            <button
              id="settings-button"
              class="icon-button"
              type="button"
              aria-label="Open settings"
              title="Settings"
              data-i18n-aria-label="settingsOpenAriaLabel"
              data-i18n-title="settingsOpenTitle"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24" width="15" height="15">
                <path d="M12 8.4a3.6 3.6 0 1 1 0 7.2 3.6 3.6 0 0 1 0-7.2Z" />
                <path d="M19.1 13.4a7.8 7.8 0 0 0 0-2.8l2-1.4-2-3.4-2.4 1a8 8 0 0 0-2.4-1.4L14 2.8h-4l-.4 2.6a8 8 0 0 0-2.4 1.4l-2.4-1-2 3.4 2 1.4a7.8 7.8 0 0 0 0 2.8l-2 1.4 2 3.4 2.4-1a8 8 0 0 0 2.4 1.4l.4 2.6h4l.4-2.6a8 8 0 0 0 2.4-1.4l2.4 1 2-3.4-2.1-1.4Z" />
              </svg>
            </button>
            <div class="version-pill" aria-label="Installed extension version" data-i18n-aria-label="versionAriaLabel">
              <span id="version-text" data-i18n="versionFallback">Version</span>
            </div>
          </div>
        </div>
        <h1 data-i18n="popupTitle">Control Chrome with any Agent</h1>
      </header>

      <section id="status-panel" class="status-panel" aria-live="polite">
        <div class="status-head">
          <div>
            <p class="label" data-i18n="nativeHostLabel">Native host</p>
            <p id="status-text" class="value" data-i18n="checkingStatus">Checking...</p>
          </div>
          <span id="status-dot" class="dot" aria-hidden="true"></span>
        </div>
        <p id="detail-text" class="detail"></p>
        <div class="status-actions">
          <button id="cleanup-button" class="cleanup-button" type="button" data-i18n="cleanupButton">
            Clean up browser tabs
          </button>
          <p id="cleanup-result" class="detail" aria-live="polite"></p>
        </div>
        <div class="signal-rail" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>

      <section id="setup-panel" class="setup-panel" hidden>
        <div class="panel-head">
          <div>
            <p id="setup-label" class="label" data-i18n="setupLabel">Setup</p>
            <h2 data-i18n="agentHandoffTitle">Agent handoff</h2>
          </div>
          <div class="setup-actions">
            <button
              id="prompt-toggle-button"
              class="prompt-toggle icon-button"
              type="button"
              aria-label="Agent handoff"
              aria-controls="agent-handoff"
              aria-expanded="true"
              title="Agent handoff"
              data-i18n-aria-label="agentHandoffTitle"
              data-i18n-title="agentHandoffTitle"
            >
              <svg aria-hidden="true" viewBox="0 0 24 24" width="15" height="15">
                <path d="m6 9 6 6 6-6" />
              </svg>
            </button>
            <button id="copy-agent-button" class="setup-copy" type="button" data-i18n="copyForAgent">Copy for Agent</button>
          </div>
        </div>
        <div class="handoff-copy">
          <p id="setup-text" class="detail"></p>
          <p id="setup-copy-text" class="detail" aria-live="polite"></p>
        </div>
        <div
          id="agent-handoff"
          class="handoff-surface"
          role="button"
          tabindex="0"
          aria-label="Copy Agent setup handoff"
          aria-describedby="setup-text setup-copy-text"
          title="Copy for Agent"
          data-i18n-aria-label="copyAgentSetupHandoff"
          data-i18n-title="copyForAgent"
        ></div>
      </section>

      <div class="actions">
        <button id="stop-button" class="stop" type="button" data-i18n="stopButton">I'll take over</button>
        <button id="resume-button" class="resume" type="button" data-i18n="resumeButton">Resume</button>
      </div>

      <section class="debug" hidden aria-hidden="true">
        <div>
          <p class="label" data-i18n="debugLogsLabel">Debug logs</p>
          <p id="debug-text" class="detail" data-i18n="disabled">Disabled</p>
        </div>
        <div class="debug-actions">
          <button id="debug-toggle-button" type="button" data-i18n="debugEnable">Enable</button>
          <button id="copy-debug-button" type="button" data-i18n="debugCopy">Copy</button>
          <button id="clear-debug-button" type="button" data-i18n="debugClear">Clear</button>
        </div>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
