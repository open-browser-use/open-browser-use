<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>open-browser-use</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main id="shell" class="shell">
      <header class="header">
        <div class="brand">
          <span class="brand-mark-wrap" aria-hidden="true">
            <img class="brand-mark" src="icons/icon-48.png" width="40" height="40" alt="" />
          </span>
          <div class="brand-copy">
            <p class="eyebrow">open-browser-use</p>
            <h1>Browser Control</h1>
          </div>
        </div>
        <div class="version-pill" aria-label="Installed extension version">
          <span id="version-text">Version</span>
        </div>
      </header>

      <section id="status-panel" class="status-panel" aria-live="polite">
        <div class="status-head">
          <div>
            <p class="label">Native host</p>
            <p id="status-text" class="value">Checking...</p>
          </div>
          <span id="status-dot" class="dot" aria-hidden="true"></span>
        </div>
        <p id="detail-text" class="detail"></p>
        <div class="signal-rail" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </section>

      <section id="setup-panel" class="setup-panel" hidden>
        <div class="panel-head">
          <div>
            <p id="setup-label" class="label">Setup</p>
            <h2>Agent handoff</h2>
          </div>
          <button id="copy-agent-button" class="setup-copy" type="button">Copy for agent</button>
        </div>
        <div class="handoff-copy">
          <p id="setup-text" class="detail"></p>
          <p id="setup-copy-text" class="detail" aria-live="polite"></p>
        </div>
        <div
          id="agent-handoff"
          class="handoff-surface"
          role="button"
          tabindex="0"
          aria-label="Copy agent setup handoff"
          title="Copy handoff"
        ></div>
      </section>

      <div class="actions">
        <button id="stop-button" class="stop" type="button">I'll take over</button>
        <button id="resume-button" class="resume" type="button">Resume</button>
      </div>

      <section class="debug" hidden aria-hidden="true">
        <div>
          <p class="label">Debug logs</p>
          <p id="debug-text" class="detail">Disabled</p>
        </div>
        <div class="debug-actions">
          <button id="debug-toggle-button" type="button">Enable</button>
          <button id="copy-debug-button" type="button">Copy</button>
          <button id="clear-debug-button" type="button">Clear</button>
        </div>
      </section>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
